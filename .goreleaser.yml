version: 2

before:
  hooks:
    - rm -rf operator/vendor
    - go mod tidy
    - go mod verify
    - go generate ./...

builds:
  - id: traefik-officer
    env:
      - CGO_ENABLED=0
      - GO111MODULE=on
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    binary: traefik-officer
    dir: ./cmd/traefik-officer
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}
    flags:
      - -trimpath

  - id: traefik-officer-operator
    env:
      - CGO_ENABLED=0
      - GO111MODULE=on
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    binary: traefik-officer-operator
    dir: ./operator
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}
    flags:
      - -trimpath

archives:
  - name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    formats:
      - tar.gz
      - zip

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^build:'
      - '^refactor:'
      - '^style:'

release:
  draft: false
  prerelease: auto
  mode: replace

  extra_files:
    - glob: traefik-officer-operator-*.tgz

dockers:
  # Standalone traefik-officer image
  - image_templates:
      - "ghcr.io/mithucste30/traefik-officer:{{ .Version }}-amd64"
      - "ghcr.io/mithucste30/traefik-officer:latest-amd64"
    dockerfile: Dockerfile.releaser
    use: docker
    build_flag_templates:
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.description=Traefik log processor with Prometheus metrics"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.source={{ .GitURL }}"
    goarch: amd64
    goos: linux
    ids:
      - traefik-officer

  - image_templates:
      - "ghcr.io/mithucste30/traefik-officer:{{ .Version }}-arm64"
      - "ghcr.io/mithucste30/traefik-officer:latest-arm64"
    dockerfile: Dockerfile.releaser
    use: docker
    build_flag_templates:
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.description=Traefik log processor with Prometheus metrics"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.source={{ .GitURL }}"
    goarch: arm64
    goos: linux
    ids:
      - traefik-officer

  # Operator image
  - image_templates:
      - "ghcr.io/mithucste30/traefik-officer-operator:{{ .Version }}-amd64"
      - "ghcr.io/mithucste30/traefik-officer-operator:latest-amd64"
    dockerfile: operator/Dockerfile.releaser
    use: docker
    build_flag_templates:
      - "--label=org.opencontainers.image.title={{ .ProjectName }}-operator"
      - "--label=org.opencontainers.image.description=Kubernetes operator for Traefik Officer"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.source={{ .GitURL }}"
    goarch: amd64
    goos: linux
    ids:
      - traefik-officer-operator

  - image_templates:
      - "ghcr.io/mithucste30/traefik-officer-operator:{{ .Version }}-arm64"
      - "ghcr.io/mithucste30/traefik-officer-operator:latest-arm64"
    dockerfile: operator/Dockerfile.releaser
    use: docker
    build_flag_templates:
      - "--label=org.opencontainers.image.title={{ .ProjectName }}-operator"
      - "--label=org.opencontainers.image.description=Kubernetes operator for Traefik Officer"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.source={{ .GitURL }}"
    goarch: arm64
    goos: linux
    ids:
      - traefik-officer-operator

docker_manifests:
  # Standalone traefik-officer manifest
  - name_template: "ghcr.io/mithucste30/traefik-officer:{{ .Version }}"
    image_templates:
      - "ghcr.io/mithucste30/traefik-officer:{{ .Version }}-amd64"
      - "ghcr.io/mithucste30/traefik-officer:{{ .Version }}-arm64"

  - name_template: "ghcr.io/mithucste30/traefik-officer:latest"
    image_templates:
      - "ghcr.io/mithucste30/traefik-officer:latest-amd64"
      - "ghcr.io/mithucste30/traefik-officer:latest-arm64"

  # Operator manifest
  - name_template: "ghcr.io/mithucste30/traefik-officer-operator:{{ .Version }}"
    image_templates:
      - "ghcr.io/mithucste30/traefik-officer-operator:{{ .Version }}-amd64"
      - "ghcr.io/mithucste30/traefik-officer-operator:{{ .Version }}-arm64"

  - name_template: "ghcr.io/mithucste30/traefik-officer-operator:latest"
    image_templates:
      - "ghcr.io/mithucste30/traefik-officer-operator:latest-amd64"
      - "ghcr.io/mithucste30/traefik-officer-operator:latest-arm64"

docker_signs:
  - artifacts: all
    cmd: cosign
    args:
      - sign
      - "${artifact}"
      - --yes
      - --recursive
    output: true

milestones:
  - close: true
