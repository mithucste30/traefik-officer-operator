name: Release

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: release
  cancel-in-progress: true

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [release]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Release Summary
        run: |
          echo "## 🚀 Release ${{ github.ref_name }}" > release-notes.md
          echo "" >> release-notes.md
          echo "### 📦 Docker Images" >> release-notes.md
          echo "" >> release-notes.md
          echo "**Standalone:**" >> release-notes.md
          echo '```bash' >> release-notes.md
          echo "docker pull ghcr.io/${{ github.repository }}/traefik-officer:${{ github.ref_name }}" >> release-notes.md
          echo '```' >> release-notes.md
          echo "" >> release-notes.md
          echo "**Operator:**" >> release-notes.md
          echo '```bash' >> release-notes.md
          echo "docker pull ghcr.io/${{ github.repository }}/traefik-officer-operator:${{ github.ref_name }}" >> release-notes.md
          echo '```' >> release-notes.md
          echo "" >> release-notes.md
          echo "### 🚀 Quick Start" >> release-notes.md
          echo "See [OPERATOR.md](https://github.com/${{ github.repository }}/blob/master/OPERATOR.md) for documentation." >> release-notes.md
          echo "" >> release-notes.md
          echo "### 📝 Built with GoReleaser" >> release-notes.md
          echo "This release uses optimized Docker builds with pre-compiled binaries for fast multi-architecture support." >> release-notes.md

      - name: Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
